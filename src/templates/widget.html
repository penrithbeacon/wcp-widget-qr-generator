<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generator</title>
  <link rel="stylesheet" href="/widget/static/style.css">
  <style>
    body { overflow: hidden; }
    .widget-wrap { display:flex; flex-direction:column; height:100vh;
                   padding:8px; gap:6px; box-sizing:border-box; }
    .input-row { display:flex; gap:5px; align-items:center; flex-shrink:0; }
    .input-row #text  { flex:1; min-width:0; }
    .input-row #size  { width:54px; flex-shrink:0; }
    .qr-area { flex:1; display:flex; align-items:center; justify-content:center;
               overflow:hidden; min-height:0; }
    .qr-area img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .qr-placeholder { color:var(--text); font-size:11px; text-align:center; opacity:.65; }
    .action-row { display:flex; gap:5px; flex-shrink:0; flex-wrap:wrap;
                  border-top:1px solid var(--border); padding-top:6px; }
    .error { color:var(--red); font-size:11px; flex-shrink:0; }
  </style>
</head>
<body>
<div class="widget-wrap">

  <div class="input-row">
    <input type="text" id="text" placeholder="Paste text or URL…" spellcheck="false">
    <input type="number" id="size" value="160" min="50" max="200" title="Size (px)">
    <button class="primary" id="btn-gen" disabled>Generate</button>
    <button id="btn-clear" disabled title="Clear">✕</button>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div class="qr-area" id="qr-area">
    <p class="qr-placeholder">Paste text above and click Generate</p>
  </div>

  <div class="action-row" id="action-row" style="display:none">
    <button onclick="downloadQR()" title="Save as PNG">⬇ Save</button>
    <button onclick="openFullWindow()">⬡ Full Screen</button>
    <button onclick="openFullTab()">⊞ New Tab</button>
  </div>

</div>
<script>
  const textEl = document.getElementById('text');
  const sizeEl = document.getElementById('size');
  const btnGen = document.getElementById('btn-gen');
  const btnClr = document.getElementById('btn-clear');
  const qrArea = document.getElementById('qr-area');
  const errEl  = document.getElementById('error');
  const actRow = document.getElementById('action-row');

  textEl.addEventListener('input', () => {
    const has = textEl.value.trim().length > 0;
    btnGen.disabled = !has;
    btnClr.disabled = !has;
  });

  btnClr.addEventListener('click', () => {
    textEl.value = '';
    btnGen.disabled = btnClr.disabled = true;
    qrArea.innerHTML = '<p class="qr-placeholder">Paste text above and click Generate</p>';
    errEl.style.display = 'none';
    actRow.style.display = 'none';
  });

  btnGen.addEventListener('click', async () => {
    const text = textEl.value.trim();
    const size = Math.max(50, Math.min(200, parseInt(sizeEl.value) || 160));
    errEl.style.display = 'none';
    btnGen.textContent = '…';
    btnGen.disabled = true;
    try {
      const r = await fetch('/widget/api/qr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, size }),
      });
      const d = await r.json();
      if (d.status !== 'Success') throw new Error(d.error || 'Error');
      const img = document.createElement('img');
      img.src = `data:image/png;base64,${d.base64Image}`;
      img.alt = 'QR Code';
      qrArea.innerHTML = '';
      qrArea.appendChild(img);
      actRow.style.display = 'flex';
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    } finally {
      btnGen.textContent = 'Generate';
      btnGen.disabled = false;
    }
  });

  textEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !btnGen.disabled) btnGen.click();
  });

  // Pass current text+size to full page so it auto-generates there
  function getFullUrl() {
    const text = textEl.value.trim();
    const size = Math.max(300, parseInt(sizeEl.value) * 2 || 400);
    return `${window.location.origin}/widget/full?${new URLSearchParams({ text, size })}`;
  }

  function downloadQR() {
    const img = qrArea.querySelector('img');
    if (!img) return;
    const a = document.createElement('a');
    a.href = img.src;
    a.download = 'qr-code.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function openFullWindow() {
    window.parent.postMessage({
      type: 'wcp:open-window', url: getFullUrl(), window: { width: 820, height: 620 }
    }, '*');
  }

  function openFullTab() {
    window.parent.postMessage({
      type: 'wcp:open-tab', url: getFullUrl(),
      title: 'QR Generator', icon: `${window.location.origin}/widget/icon.svg`, persist: false
    }, '*');
  }
</script>
</body>
</html>
