<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Generator</title>
  <script type="application/ld+json">{{ jsonld|safe }}</script>
  <style>
    :root {
      --bg:#0d1117; --surface:#161b22; --surface2:#1c2128;
      --border:#30363d; --text:#e6edf3; --muted:#8b949e;
      --accent:#f0883e; --red:#f85149; --blue:#58a6ff; --radius:6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px; height: 100%; overflow: hidden; }

    .widget-wrap { display:flex; flex-direction:column; height:100vh;
                   padding:8px; gap:6px; }

    /* Input row — full width */
    .input-row { display:flex; gap:5px; align-items:center; flex-shrink:0; }
    .input-row #text  { flex:1; min-width:0; background:var(--surface2);
      border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text); font-family:inherit; font-size:12px; padding:6px 8px; }
    .input-row #text:focus { outline:none; border-color:var(--accent); }
    .input-row #size  { width:54px; flex-shrink:0; background:var(--surface2);
      border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text); font-family:inherit; font-size:12px; padding:6px 8px; }
    .input-row #size:focus { outline:none; border-color:var(--accent); }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; }
    input[type=number] { -moz-appearance:textfield; }

    /* Buttons */
    button { background:var(--surface2); border:1px solid var(--border);
      border-radius:var(--radius); color:var(--text); cursor:pointer;
      font-family:inherit; font-size:12px; padding:6px 10px;
      transition:background .15s, opacity .15s; display:inline-flex;
      align-items:center; justify-content:center; gap:4px; }
    button:hover:not(:disabled) { background:var(--surface); }
    button:disabled { opacity:.35; cursor:default; }
    button.primary { background:var(--accent); border-color:var(--accent);
                     color:#0d1117; font-weight:600; }
    button.primary:hover:not(:disabled) { background:#e07020; }
    button.icon-btn { padding:6px 8px; }

    /* QR area */
    .qr-area { flex:1; display:flex; align-items:center; justify-content:center;
               overflow:hidden; min-height:0; }
    .qr-area img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
    .qr-placeholder { color:var(--text); font-size:11px; text-align:center; opacity:.6; }

    .error { color:var(--red); font-size:11px; flex-shrink:0; }

    /* Action row — always visible, right-aligned */
    .action-row { display:flex; align-items:center; gap:5px; flex-shrink:0;
                  border-top:1px solid var(--border); padding-top:6px; justify-content:flex-end; }
  </style>
</head>
<body>
<div class="widget-wrap">

  <div class="input-row">
    <input type="text" id="text" placeholder="Paste text or URL…" spellcheck="false">
    <input type="number" id="size" value="160" min="50" max="200">
    <button class="primary" id="btn-gen" disabled>Generate</button>
    <button id="btn-clear" disabled title="Clear">✕</button>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div class="qr-area" id="qr-area">
    <p class="qr-placeholder">Paste text above and click Generate</p>
  </div>

  <!-- Action row always visible; Save disabled until QR exists -->
  <div class="action-row">
    <button id="btn-dl" disabled title="Download QR as PNG">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
      Download PNG
    </button>

  </div>

</div>
<script>
const WCP_ORCHESTRATION_ID = "{{ wcp_orchestration_id|default('', true) }}";
const WCP_APPLICATION_ID   = "{{ wcp_application_id|default('', true) }}";
function wcpFetch(url, opts) {
  opts = opts || {};
  const extra = {};
  if (WCP_ORCHESTRATION_ID) extra['Wcp-Orchestration-Id'] = WCP_ORCHESTRATION_ID;
  if (WCP_APPLICATION_ID)   extra['Wcp-Application-Id']   = WCP_APPLICATION_ID;
  opts.headers = Object.assign({}, opts.headers || {}, extra);
  return fetch(url, opts);
}
  const textEl  = document.getElementById('text');
  const sizeEl  = document.getElementById('size');
  const btnGen  = document.getElementById('btn-gen');
  const btnClr  = document.getElementById('btn-clear');
  const btnDl   = document.getElementById('btn-dl');
  const qrArea  = document.getElementById('qr-area');
  const errEl   = document.getElementById('error');

  function updateButtons() {
    const has = textEl.value.trim().length > 0;
    btnGen.disabled = !has;
    btnClr.disabled = !has;
  }

  textEl.addEventListener('input', updateButtons);

  btnClr.addEventListener('click', () => {
    textEl.value = '';
    updateButtons();
    qrArea.innerHTML = '<p class="qr-placeholder">Paste text above and click Generate</p>';
    errEl.style.display = 'none';
    btnDl.disabled = true;
  });

  btnGen.addEventListener('click', async () => {
    const text = textEl.value.trim();
    const size = Math.max(50, Math.min(200, parseInt(sizeEl.value) || 160));
    errEl.style.display = 'none';
    btnGen.textContent = '…';
    btnGen.disabled = true;
    try {
      const r = await fetch('/widget/api/qr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, size }),
      });
      const d = await r.json();
      if (d.status !== 'Success') throw new Error(d.error || 'Error');
      const img = document.createElement('img');
      img.src = `data:image/png;base64,${d.base64Image}`;
      img.alt = 'QR Code';
      qrArea.innerHTML = '';
      qrArea.appendChild(img);
      btnDl.disabled = false;
    } catch (e) {
      errEl.textContent = e.message;
      errEl.style.display = 'block';
    } finally {
      btnGen.textContent = 'Generate';
      updateButtons();
    }
  });

  textEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !btnGen.disabled) btnGen.click();
  });

  btnDl.addEventListener('click', () => {
    const img = qrArea.querySelector('img');
    if (!img) return;
    // Route through parent to get native Electron save dialog
    window.parent.postMessage({
      type: 'wcp:download-file', filename: 'qr-code.png', dataUrl: img.src
    }, '*');
  });

  function getFullUrl(embedded) {
    const text = textEl.value.trim();
    const size = Math.max(300, parseInt(sizeEl.value) * 2 || 400);
    const p = new URLSearchParams({ text, size });
    if (embedded) p.set('embedded', '1');
    return `${window.location.origin}/widget/full?${p}`;
  }

  function openFullWindow() {
    window.parent.postMessage({
      type: 'wcp:open-window', url: getFullUrl(false), window: { width: 820, height: 620 }
    }, '*');
  }

  function openFullTab() {
    window.parent.postMessage({
      type: 'wcp:open-tab', url: getFullUrl(true),
      title: 'QR Generator', icon: `${window.location.origin}/widget/icon.svg`, persist: true
    }, '*');
  }
  window.parent?.postMessage({ type: 'wcp:ready' }, '*');
  window.addEventListener('message', e => {
    if (e.data?.type === 'wcp:context' && e.data.theme)
      for (const [k, v] of Object.entries(e.data.theme))
        document.documentElement.style.setProperty(k, v);
  });
</script>
</body>
</html>
